name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test FastAPI Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python 3.11.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q app

      - name: Run tests (if tests directory exists)
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found. Skipping pytest."
          fi

  deploy:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy code via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/log_back"
            VENV_PIP="/var/www/log_back/.venv/bin/pip"
            APP_SERVICE="log-back-api.service"
            GRPC_SERVICE="log-back-grpc.service"

            cd "$APP_DIR"

            echo "Pulling latest changes from main"
            git pull origin main

            echo "Installing requirements"
            "$VENV_PIP" install -r requirements.txt

            restart_service() {
              SERVICE_NAME="$1"

              if ! command -v systemctl >/dev/null 2>&1; then
                echo "systemctl is not available on target machine"
                exit 1
              fi

              if ! systemctl list-unit-files | grep -q "^${SERVICE_NAME}"; then
                echo "Required service not found: ${SERVICE_NAME}"
                exit 1
              fi

              echo "Restarting systemd service: ${SERVICE_NAME}"
              sudo systemctl daemon-reload
              sudo systemctl restart "${SERVICE_NAME}"
              sudo systemctl is-active --quiet "${SERVICE_NAME}"
            }

            echo "Restarting API"
            restart_service "$APP_SERVICE"

            echo "Restarting gRPC"
            restart_service "$GRPC_SERVICE"

            echo "Deployment finished"
